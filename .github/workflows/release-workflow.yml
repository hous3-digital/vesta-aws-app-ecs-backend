name: release-workflow

on:
  workflow_run:
    workflows: ["Staging Deployment"]
    types: ["completed"]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  repository-projects: write

jobs:
  release:
    permissions:
      pull-requests: write
      contents: write
      repository-projects: write
    uses: hous3-digital/shared-workflows/.github/workflows/shared-release.yml@v1.18.0
    secrets: inherit
