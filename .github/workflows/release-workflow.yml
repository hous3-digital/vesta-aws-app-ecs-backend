name: release-workflow

on:
  workflow_run:
    workflows: ["staging-workflow"]
    types: ["completed"]

permissions:
  pull-requests: write
  contents: write
  repository-projects: write

jobs:
  release:
    name: Create Release Branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: echo "Release triggered for ${{ github.ref }}"

      - name: Create release branch
        run: |
          latest_tag=$(gh release list --limit 100 --exclude-drafts | awk '$3 ~ /-staging\./ { print $3 }' | sort -V | tail -n 1)
          base_version=$(echo "$latest_tag" | sed -E 's/^(v[0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          RELEASE_BRANCH="release/${latest_tag}"
          git fetch
          git checkout staging
          git pull
          git checkout -b $RELEASE_BRANCH
          git push origin $RELEASE_BRANCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(gh release list --limit 100 --exclude-drafts | awk '$3 ~ /-staging\./ { print $3 }' | sort -V | tail -n 1)
          base_version=$(echo "$latest_tag" | sed -E 's/^(v[0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          RELEASE_BRANCH="release/${latest_tag}"

          echo ${{ github.ref_name }}

          pr_number=$(gh pr list --state open --head $RELEASE_BRANCH --base main --json number -q '.[].number')
          sleep 4
          if [ -n "$pr_number" ]; then
            echo "GOING TO EDIT CURRENT PR"
            gh pr edit $pr_number \
              --title "PR: $RELEASE_BRANCH -> main" \

          else 
            echo "GOING TO CREATE PR"
              gh pr create \
              --title "PR: $RELEASE_BRANCH -> main" \
              --body "Description" \
              --head $RELEASE_BRANCH \
              --base main 
          fi
