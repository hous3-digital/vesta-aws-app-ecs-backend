name: Deploy to Production Environment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write
  actions: read

jobs:
  call-shared-ci:
    permissions: write-all
    uses: hous3-digital/shared-workflows/.github/workflows/shared-backend-ci.yml@v1.25.0
    with:
      working_directory: app
      node_version: "22"
      enable_lint: true
      enable_security_scan: true
      enable_test: true
      enable_secrets_scan: true
      blocking_gitleaks: true
      block_severities: "high"
      blocking_audit: true
      block_only_direct: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  terraform-ci:
    permissions:
      pull-requests: write
      contents: write
      security-events: write
      id-token: write
    uses: hous3-digital/shared-workflows/.github/workflows/shared-terraform-ci.yml@v1.25.0
    with:
      working_directory: infra/terraform
      tf_var_file: envs/prod/variables.tfvars
      environment: prod
      terraform_version: "1.14.7"
      backend_bucket: trust-production-terraform-state
      backend_key: ecs-app-backend.tfstate
      workspace_key_prefix: env:/prod/envs
      aws_auth_method: role
      enable_security_scan: true
      enable_terraform_tests: true
      terraform_tests_directory: "tests"
      trivy_minimum_severity: "MEDIUM"
      checkov_skip_checks: ""
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}

  deploy-ecs-app:
    uses: hous3-digital/shared-workflows/.github/workflows/shared-backend-deploy-ecs.yml@v1.25.0
    needs: [call-shared-ci, terraform-ci]
    with:
      enable_deploy: true
      working_directory: infra/terraform
      tf_var_file: envs/prod/variables.tfvars
      environment: prod
      terraform_version: "1.14.7"
      backend_config: ${{ needs.terraform-ci.outputs.backend_config }}
      aws_auth_method: role
      ecr_repository: hous3-vesta
      cluster_name: hous3-trust-ecs-cluster
      service_name: vesta-app-backend
      enable_incident_report: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
      INCIDENT_IO_TOKEN: ${{ secrets.INCIDENT_IO_TOKEN }}
      INCIDENT_IO_ENDPOINT: ${{ secrets.INCIDENT_IO_ENDPOINT }}

  confirm-release:
    name: Confirm Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tags
        run: |
          git fetch --prune --unshallow || true
          git fetch --tags --force

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release@24
