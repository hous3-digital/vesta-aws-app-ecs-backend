name: staging-workflow

on:
  push:
    branches:
      - staging

permissions:
  contents: read

env:
  TF_WORKSPACE: staging
  TF_VERSION: "1.14.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_BACKEND_BUCKET: "trust-staging-terraform-state"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: app/node_modules

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: |
          cd app
          yarn
          yarn lint

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Security Scan
        run: cd app && yarn audit:ci
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    env:
      COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '10' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd app && yarn prisma:gen

      - name: Run tests with coverage
        run: cd app && yarn test:cov
        continue-on-error: true

      - name: Check coverage thresholds
        run: |
          cd app
          echo "Checking coverage thresholds (minimum ${COVERAGE_THRESHOLD}%)..."
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: ${COVERAGE}%"

          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage is below ${COVERAGE_THRESHOLD}% threshold (${COVERAGE}%)"
            exit 1
          else
            echo "Coverage meets ${COVERAGE_THRESHOLD}% threshold (${COVERAGE}%)"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/

  terraform-ci:
    name: Terraform CI - staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          cd infra/terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=aws-ecs-app-vesta-backend.tfstate" \
            -backend-config="workspace_key_prefix=env" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -var-file=envs/staging/variables.tfvars -detailed-exitcode

  terraform-cd:
    name: Deploy Terraform to staging
    needs: [terraform-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          repository: hous3-digital/vesta-aws-app-ecs-backend
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ secrets.AWS_REGION  }}

      - name: Load Configs
        uses: pietrobolcato/action-read-yaml@1.1.0
        id: yml
        with:
          config: ${{ github.workspace }}/hous3-pipes.yml

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          cd infra/terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        env:
          AWS_REGION_VAR: ${{ env.AWS_REGION }}
          TF_BACKEND_BUCKET_VAR: ${{ env.TF_BACKEND_BUCKET }}
        run: |
          cd infra/terraform
          terraform init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET_VAR}" \
            -backend-config="key=aws-ecs-app-vesta-backend.tfstate" \
            -backend-config="workspace_key_prefix=env" \
            -backend-config="region=${AWS_REGION_VAR}" \
            -backend-config="encrypt=true"

      - name: Check if ECS service exists and import if needed
        continue-on-error: true
        env:
          AWS_REGION_VAR: ${{ env.AWS_REGION }}
        run: |
          cd infra/terraform

          # Verifica se o serviço já existe na AWS
          if aws ecs describe-services --cluster hous3-trust-ecs-cluster --services vesta-app-backend --region "${AWS_REGION_VAR}" --query 'services[?status!=`INACTIVE`]' --output text | grep -q vesta-app-backend; then
            echo "ECS service exists, checking Terraform state..."
            # Verifica se está no state do Terraform
            if ! terraform state list | grep -q 'module.ecs_service.aws_ecs_service.this'; then
              echo "Importing existing ECS service to Terraform state..."
              CLUSTER_ARN=$(aws ecs describe-clusters --clusters hous3-trust-ecs-cluster --region "${AWS_REGION_VAR}" --query 'clusters[0].clusterArn' --output text)
              terraform import -var-file=envs/staging/variables.tfvars 'module.ecs_service.aws_ecs_service.this[0]' "${CLUSTER_ARN}/vesta-app-backend"
            else
              echo "Service already in Terraform state"
            fi
          else
            echo "No existing ECS service found"
          fi

      - name: Terraform Apply
        if: ${{ steps.yml.outputs['destroy.enable'] != 'true' && steps.yml.outputs['destroy.confirmation_required'] != 'true' }}
        run: |
          cd infra/terraform
          terraform apply -var-file=envs/staging/variables.tfvars -auto-approve

      - name: Terraform Destroy
        if: ${{ steps.yml.outputs['destroy.enable'] == 'true' && steps.yml.outputs['destroy.confirmation_required'] == 'true' }}
        run: |
          cd infra/terraform
          terraform destroy -var-file=envs/staging/variables.tfvars -auto-approve

  build-and-deploy-image:
    name: Build & Deploy Image to ECR
    needs: [terraform-cd, lint]
    runs-on: ubuntu-latest
    outputs:
      image-url: ${{ steps.login-ecr.outputs.registry }}/vesta-app-backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ secrets.AWS_REGION  }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: hous3-vesta
          IMAGE_TAG: ${{ github.sha }}
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/hous3-vesta:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/hous3-vesta:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bluegreen-deploy:
    name: Blue/Green Deploy via Listener Switch
    needs: build-and-deploy-image
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ needs.build-and-deploy-image.outputs.image-url }}
      TF_VERSION: "1.14.0"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          AWS_REGION_VAR: ${{ env.AWS_REGION }}
          TF_BACKEND_BUCKET_VAR: ${{ env.TF_BACKEND_BUCKET }}
        run: |
          cd infra/terraform
          terraform init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET_VAR}" \
            -backend-config="key=aws-ecs-app-vesta-backend.tfstate" \
            -backend-config="workspace_key_prefix=env" \
            -backend-config="region=${AWS_REGION_VAR}" \
            -backend-config="encrypt=true"

      - name: Read current active color
        id: tf-out
        run: |
          cd infra/terraform
          # Tenta ler o output, se falhar usa 'blue' como padrão
          ACTIVE=$(terraform output -json active_color 2>/dev/null | jq -r '.' 2>/dev/null || echo "blue")
          echo "active=${ACTIVE}" >> $GITHUB_OUTPUT
          echo "Active color: ${ACTIVE}"

      - name: Compute inactive color
        id: colors
        env:
          ACTIVE_COLOR: ${{ steps.tf-out.outputs.active }}
        run: |
          if [ "${ACTIVE_COLOR}" = "blue" ]; then INACTIVE=green; else INACTIVE=blue; fi
          echo "inactive=${INACTIVE}" >> $GITHUB_OUTPUT

      - name: Deploy new image to ECS service
        run: |
          # Update ECS service with new image
          aws ecs update-service \
            --cluster hous3-trust-ecs-cluster \
            --service vesta-app-backend \
            --task-definition $(aws ecs describe-services --cluster hous3-trust-ecs-cluster --services vesta-app-backend --query 'services[0].taskDefinition' --output text) \
            --force-new-deployment

      - name: Wait for service to be stable
        timeout-minutes: 5
        run: |
          aws ecs wait services-stable \
            --cluster hous3-trust-ecs-cluster \
            --services vesta-app-backend

      - name: Check ECS deployment status
        id: ecs_status
        run: |
          STATUS=$(aws ecs describe-services --cluster hous3-trust-ecs-cluster --services vesta-app-backend --query 'services[0].deployments[?status==`FAILED`]' --output text)
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Fallback to previous color if deploy failed
        if: steps.ecs_status.outputs.status != ''
        env:
          ACTIVE_COLOR: ${{ steps.tf-out.outputs.active }}
        run: |
          echo "Deploy falhou! Realizando fallback para cor anterior..."
          cd infra/terraform
          terraform apply -var-file=envs/staging/variables.tfvars \
            -var "active_color=${ACTIVE_COLOR}" \
            -auto-approve
          exit 1

      - name: Switch listener to inactive color
        env:
          INACTIVE_COLOR: ${{ steps.colors.outputs.inactive }}
        run: |
          cd infra/terraform
          terraform apply -var-file=envs/staging/variables.tfvars \
            -var "active_color=${INACTIVE_COLOR}" \
            -auto-approve

  generate-release:
    name: Generate Pre-Release
    runs-on: ubuntu-latest
    needs: bluegreen-deploy
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
          persist-credentials: true
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
