name: feature-workflow

on:
  push:
    branches:
      - feat/**
      - chore/**
      - fix/**
      - task/**

permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: app/node_modules

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: |
          cd app
          yarn
          yarn lint

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Security Scan
        run: cd app && yarn audit:ci
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    env:
      COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '10' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "app/yarn.lock"

      - name: Install dependencies
        run: cd app && yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd app && yarn prisma:gen

      - name: Run tests with coverage
        run: cd app && yarn test:cov
        continue-on-error: true

      - name: Check coverage thresholds
        run: |
          cd app
          echo "Checking coverage thresholds (minimum ${COVERAGE_THRESHOLD}%)..."
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Line coverage: ${COVERAGE}%"

          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage is below ${COVERAGE_THRESHOLD}% threshold (${COVERAGE}%)"
            exit 1
          else
            echo "Coverage meets ${COVERAGE_THRESHOLD}% threshold (${COVERAGE}%)"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/

  pull-request:
    name: Open PR
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          BRANCH_REF: ${{ github.ref }}
        run: |
          echo "$BRANCH_NAME"

          pr_number=$(gh pr list --state open --head "$BRANCH_NAME" --base staging --json number -q '.[].number')
          sleep 4
          if [ -n "$pr_number" ]; then
            echo "GOING TO EDIT CURRENT PR"
            gh pr edit "$pr_number" \
              --title "PR: $BRANCH_NAME -> staging"

          else 
            echo "GOING TO CREATE PR"
              gh pr create \
              --title "PR: $BRANCH_NAME -> staging" \
              --body-file .github/pull_request_template.md \
              --head "$BRANCH_REF" \
              --base staging 
          fi
