name: feature-workflow

on:
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**
      - task/**
      - refactor/**

permissions:
  contents: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  call-shared-ci:
    permissions: write-all
    uses: hous3-digital/shared-workflows/.github/workflows/shared-backend-ci.yml@v1.18.0
    with:
      working_directory: app
      node_version: "22"
      enable_lint: true
      enable_security_scan: true
      enable_test: true
      enable_secrets_scan: true
      blocking_gitleaks: false
      block_severities: ""
      blocking_audit: false
      block_only_direct: false
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  terraform-ci:
    permissions:
      pull-requests: write
      contents: write
      security-events: write
      id-token: write
    uses: hous3-digital/shared-workflows/.github/workflows/shared-terraform-ci.yml@v1.18.0
    with:
      working_directory: infra/terraform
      tf_var_file: envs/staging/variables.tfvars
      environment: staging
      terraform_version: "1.14.7"
      backend_bucket: hous3-terraform
      backend_key: aws-ecs-app-backend.tfstate
      workspace_key_prefix: env
      aws_auth_method: role
      enable_security_scan: true
      enable_terraform_tests: true
      trivy_minimum_severity: "MEDIUM"
      checkov_skip_checks: ""
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}

  create-pull-request:
    name: Create Pull Request to staging
    needs:
      - call-shared-ci
      - terraform-ci
    if: |
      github.event_name == 'push' &&
      needs.terraform-ci.result == 'success' &&
      needs.call-shared-ci.result == 'success'
    uses: hous3-digital/shared-workflows/.github/workflows/shared-pr-create-auto.yml@v1.18.0
    permissions:
      pull-requests: write
      contents: write
    with:
      base_branch: staging
      pr_title: "${{ github.ref_name }} → staging"
      pr_body: |
        ## Backend Changes

        **Branch:** `${{ github.ref_name }}`
        **Target:** `staging`

        ### Summary

        ### Checklist
        - [x] Lint passed
        - [x] Tests passed
        - [x] Dependency audit completed
        - [x] Security scan completed

        ### Next Steps
        1. Review CI and scan outputs
        2. Verify any security or dependency findings
        3. Approve and merge to `staging` to proceed with downstream releases

        ---
        *Auto-generated by GitHub Actions*
      update_existing: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
